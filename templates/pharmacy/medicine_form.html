{% extends 'base.html' %}

{% block page_title %}{{ title }}{% endblock %}
{% block page_subtitle %}Kelola data master obat{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Obat</label>
                    {{ form.name }}
                </div>
                
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi</label>
                    {{ form.description }}
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Stok Awal</label>
                    {{ form.stock }}
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Satuan (Unit)</label>
                    {{ form.unit }}
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Harga (Rp)</label>
                    {{ form.price }}
                </div>

                <div class="flex items-center pt-8">
                    <label class="flex items-center gap-3 cursor-pointer">
                        {{ form.is_active }}
                        <span class="text-sm font-medium text-slate-700">Status Aktif</span>
                    </label>
                </div>
            </div>

            <div class="pt-6 flex justify-end gap-3 border-t border-slate-100 mt-6">
                <a href="{% url 'medicine-list' %}" class="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 border border-slate-200 font-medium transition-colors">
                    Batal
                </a>
                <button type="submit" class="px-5 py-2.5 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium shadow-lg shadow-teal-500/30 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    {{ action }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
