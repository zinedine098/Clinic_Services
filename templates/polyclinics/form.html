{% extends 'base.html' %}

{% block page_title %}{{ title }}{% endblock %}
{% block page_subtitle %}Formulir data poliklinik{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Poliklinik</label>
                {{ form.name }}
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi</label>
                {{ form.description }}
            </div>

            <div class="flex items-center pt-2">
                <label class="flex items-center gap-3 cursor-pointer">
                    {{ form.is_active }}
                    <span class="text-sm font-medium text-slate-700">Status Aktif</span>
                </label>
            </div>

            <div class="pt-6 flex justify-end gap-3 border-t border-slate-100 mt-6">
                <a href="{% url 'polyclinic-list' %}" class="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 border border-slate-200 font-medium transition-colors">
                    Batal
                </a>
                <button type="submit" class="px-5 py-2.5 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium shadow-lg shadow-teal-500/30 transition-all">
                    {{ action }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
